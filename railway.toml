# =============================================================================
# ReceiptLens — Railway deployment configuration
# =============================================================================
# Environment variables (set in Railway dashboard):
#   PORT               — Bind port (Railway sets this automatically)
#   CORS_ORIGINS       — Comma-separated allowed origins
#   AUTH_TOKEN         — Bearer token for API auth
#   TESSDATA_PREFIX    — Tesseract data path (usually auto-detected)
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "infra/Dockerfile"

[deploy]
startCommand = "sh -c 'uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# OCR workloads are memory-intensive; allocate generously.
# Railway starter plan: 512 MB / 1 vCPU. Upgrade if OCR of large images OOMs.
#memory = "512m"
#cpu = "1.0"
